ity</text><text x="107.5" y="150" font-size="10" fill="#64748b" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">RGB Image  xᵢ</text><rect x="260" y="100" width="215" height="70" fill="#ecfdf5" stroke="#059669" stroke-width="1.8" rx="6" /><text x="367.5" y="122" font-size="11" fill="#047857" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Teacher Encoder</text><text x="367.5" y="142" font-size="9" fill="#047857" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">WRN50_2 (frozen)</text><text x="367.5" y="158" font-size="9" fill="#64748b" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">multi-scale features fᵢˡ</text><line x1="200" y1="135.0" x2="260" y2="135.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><rect x="510" y="200" width="150" height="60" fill="#ecfdf5" stroke="#059669" stroke-width="1.8" rx="6" /><text x="585.0" y="222" font-size="10" fill="#047857" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">I-Bottleneck</text><text x="585.0" y="242" font-size="9" fill="#64748b" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">compressed rep</text><line x1="475" y1="135.0" x2="495" y2="135.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><line x1="495" y1="135.0" x2="495" y2="230.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><line x1="495" y1="230.0" x2="510" y2="230.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><rect x="720" y="200" width="185" height="70" fill="#ecfdf5" stroke="#059669" stroke-width="1.8" rx="6" /><text x="812.5" y="222" font-size="11" fill="#047857" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Student Decoder</text><text x="812.5" y="242" font-size="9" fill="#047857" font-weight="normal" text-anchor="middle"