t-family="Arial, Helvetica, sans-serif">(2 trainable scalars)</text><line x1="107.5" y1="530" x2="107.5" y2="545" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow_blue)" /><rect x="260" y="545" width="215" height="70" fill="#ecfdf5" stroke="#059669" stroke-width="1.8" rx="6" /><text x="367.5" y="567" font-size="11" fill="#047857" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Teacher Encoder</text><text x="367.5" y="587" font-size="9" fill="#047857" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">WRN50_2 (frozen)</text><text x="367.5" y="603" font-size="9" fill="#64748b" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">multi-scale features fₗˡ</text><line x1="200" y1="580.0" x2="260" y2="580.0" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow_blue)" /><rect x="510" y="635" width="150" height="60" fill="#ecfdf5" stroke="#059669" stroke-width="1.8" rx="6" /><text x="585.0" y="657" font-size="10" fill="#047857" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">D-Bottleneck</text><text x="585.0" y="677" font-size="9" fill="#64748b" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">compressed rep</text><line x1="475" y1="580.0" x2="495" y2="580.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><line x1="495" y1="580.0" x2="495" y2="665.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><line x1="495" y1="665.0" x2="510" y2="665.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><rect x="720" y="635" width="185" height="70" fill="#ecfdf5" stroke="#059669" stroke-width="1.8" rx="6" /><text x="812.5" y="657" font-size="11" fill="#047857" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Student Decoder</text><text x="812.5" y="677" font-size="9" fill="#047857" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">(frozen)</text><text x="812.5" y="693" font-size="9" fill="#64748b" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">recover teacher features</text><line x1="660" y1="665.0" x2="720" y2="665.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><rect x="980" y="635" width="195" height="80" fill="#fef3c7" stroke="#d97706" stroke-width="1.8" rx="6" /><text x="1077.5" y="659" font-size="11" fill="#92400e" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">D-Anomaly Map</text><text x="1077.5" y="681" font-size="10" fill="#0f172a" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Mₗ = teacher-student diff</text><text x="1077.5" y="701" font-size="9" fill="#64748b" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">→ cross-conditioned score</text><line x1="905" y1="670.0" x2="980" y2="670.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><rect x="695" y="392.5" width="140" height="95" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.8" rx="6" /><text x="765.0" y="414.5" font-size="11" fill="#0369a1" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">CF Module</text><text x="765.0" y="434.5" font-size="9" fill="#0369a1" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Crossmodal Filter</text><text x="765.0" y="450.5" font-size="9" fill="#0369a1" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">at bottleneck</text><text x="765.0" y="466.5" font-size="8" fill="#0284c7" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Selective FT ≈ 54p</text><line x1="660" y1="230.0" x2="695" y2="424.1666666666667" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow_cyan)" /><line x1="660" y1="665.0" x2="695" y2="455.8333333333333" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow_cyan)" /><line x1="835" y1="424.1666666666667" x2="668" y2="230.0" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow_cyan)" /><line x1="835" y1="455.8333333333333" x2="668" y2="665.0" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow_cyan)" /><text x="675" y="327.0833333333333" font-size="8" fill="#0369a1" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">I↔D</text><rect x="935" y="392.5" width="150" height="95" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.8" rx="6" /><text x="1010.0" y="414.5" font-size="11" fill="#0369a1" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">CA Module</text><text x="1010.0" y="434.5" font-size="9" fill="#0369a1" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Crossmodal Amplifier</text><text x="1010.0" y="450.5" font-size="9" fill="#0369a1" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">at decoder skip fusion</text><text x="1010.0" y="466.5" font-size="8" fill="#0284c7" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Selective FT ≈ 54p</text><line x1="905" y1="235.0" x2="935" y2="424.1666666666667" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow_cyan)" /><line x1="905" y1="670.0" x2="935" y2="455.8333333333333" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow_cyan)" /><line x1="1085" y1="424.1666666666667" x2="913" y2="235.0" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow_cyan)" /><line x1="1085" y1="455.8333333333333" x2="913" y2="670.0" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow_cyan)" /><rect x="1225" y="397.5" width="230" height="110" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" rx="6" /><text x="1340.0" y="419.5" font-size="12" fill="#92400e" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Fusion Anomaly Map</text><text x="1340.0" y="445.5" font-size="11" fill="#0f172a" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">M = Mᵢⁿᵒʳᵐ + Mₗⁿᵒʳᵐ</text><text x="1340.0" y="469.5" font-size="10" fill="#d97706" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">normalized sum fusion</text><text x="1340.0" y="491.5" font-size="9" fill="#64748b" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">→ image-level anomaly score</text><line x1="1175" y1="230.0" x2="1225" y2="434.1666666666667" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><line x1="1175" y1="675.0" x2="1225" y2="470.8333333333333" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><text x="585.0" y="186" font-size="9" fill="#0284c7" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">← Bottleneck stage</text><text x="812.5" y="186" font-size="9" fill="#0284c7" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">← Decoder skip stage</text><rect x="15" y="710" width="440" height="95" fill="#fefce8" stroke="#ca8a04" stroke-width="2" rx="6" /><text x="20" y="734" font-size="12" fill="#854d0e" font-weight="bold" text-anchor="start" font-family="Arial, Helvetica, sans-serif">Training Loss</text><text x="20" y="756" font-size="11" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">L = L_FDM + λ_cf · L_CF + λ_ca · L_CA</text><text x="20" y="776" font-size="9" fill="#64748b" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">L_FDM: feature distribution matching (μ, σ)   |   L_CF: CF consistency   |   L_CA: CA consistency</text><text x="20" y="792" font-size="9" fill="#64748b" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">Only φ_affine (γ, β) and φ_cf/ca updated; all other parameters frozen</text><rect x="490" y="710" width="460" height="95" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" rx="6" /><text x="500" y="734" font-size="12" fill="#166534" font-weight="bold" text-anchor="start" font-family="Arial, Helvetica, sans-serif">Inference (no gradient)</text><text x="500" y="756" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">1. DepthAffinePEFT: xₗ' = γ · xₗ + β</text><text x="500" y="770" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">2. Extract teacher features fᵢ, fₗ (multi-scale)</text><text x="500" y="784" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">3. CF at bottleneck, CA at decoder skip: cross-modal modulation</text><text x="500" y="798" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">4. Student recovery → Mᵢ, Mₗ (anomaly maps)</text><text x="500" y="812" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">5. M = Mᵢⁿᵒʳᵐ + Mₗⁿᵒʳᵐ → image score</text><rect x="990" y="705" width="250" height="120" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="6" /><text x="1000" y="730" font-size="11" fill="#64748b" font-weight="bold" text-anchor="start" font-family="Arial, Helvetica, sans-serif">Legend</text><rect x="1000" y="738" width="14" height="12" fill="#059669" stroke="#059669" stroke-width="1" rx="2" /><text x="1022" y="748" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">Frozen (no gradient)</text><rect x="1000" y="755" width="14" height="12" fill="#2563eb" stroke="#2563eb" stroke-width="1" rx="2" /><text x="1022" y="765" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">Trainable (PEFT params)</text><rect x="1000" y="772" width="14" height="12" fill="#0284c7" stroke="#0284c7" stroke-width="1" rx="2" /><text x="1022" y="782" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">Selective Fine-Tuning</text><rect x="1000" y="789" width="14" height="12" fill="#334155" stroke="#334155" stroke-width="1" rx="2" /><text x="1022" y="799" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">Data flow</text><rect x="1000" y="806" width="14" height="12" fill="#ca8a04" stroke="#ca8a04" stroke-width="1" rx="2" /><text x="1022" y="816" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="start" font-family="Arial, Helvetica, sans-serif">Training signal</text></svg>