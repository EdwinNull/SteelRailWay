eight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">Fusion Anomaly Map</text><text x="1360.0" y="320" font-size="11" fill="#0f172a" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">M = Mᵢⁿᵒʳᵐ + Mₗⁿᵒʳᵐ</text><text x="1360.0" y="345" font-size="9" fill="#d97706" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">normalized sum fusion</text><line x1="1130" y1="295.0" x2="1220" y2="295.0" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow_gray)" /><rect x="610" y="510" width="520" height="38" fill="#fdf2f8" stroke="#db2777" stroke-width="2" rx="6" stroke-dasharray="8,4" /><text x="870.0" y="534" font-size="11" fill="#9d174d" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">isolated AUROC 诊断:  Δ = AUROC_cross − AUROC_isolated  →  量化跨模态路径贡献度</text><rect x="1220" y="560" width="280" height="160" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" rx="6" /><text x="1360.0" y="582" font-size="12" fill="#7c3aed" font-weight="bold" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">训练参数统计</text><text x="1360.0" y="600" font-size="6" fill="#0f172a" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" /><text x="1360.0" y="618" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">DepthAffinePEFT: γ, β  (2 params)</text><text x="1360.0" y="636" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">CF/CA Selective FT: ≈ 108 params</text><text x="1360.0" y="654" font-size="9" fill="#0f172a" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif">主干参数: 0 (全部冻结)</text><text x="1360.0" y="672" font-size="6" fill="#0f172a" font-weight="normal" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" /><text x="1360.0" y="690" font-size="10" fill="#7c3aed" 